services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ContentLane
      POSTGRES_USER: ContentLane
      POSTGRES_PASSWORD: ContentLane
    ports:
      - "5432:5432"
    volumes:
      - ContentLane_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ContentLane -d ContentLane"]
      interval: 3s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ContentLane_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
volumes:
  ContentLane_postgres:
  ContentLane_redis:
