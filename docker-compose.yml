services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reelswarm
      POSTGRES_USER: reelswarm
      POSTGRES_PASSWORD: reelswarm
    ports:
      - "5432:5432"
    volumes:
      - reelswarm_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reelswarm -d reelswarm"]
      interval: 3s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - reelswarm_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
volumes:
  reelswarm_postgres:
  reelswarm_redis:
